<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Loja</title>
  <style>
    body {font-family: Arial; margin:0; background:#f5f5f5;}
    header {background:#ff3c00; color:white; padding:20px; text-align:center;}
    .container {display:flex; flex-wrap:wrap; justify-content:center; padding:20px;}
    .produto {background:white; margin:10px; padding:15px; border-radius:10px; width:250px; box-shadow:0 0 10px rgba(0,0,0,0.1); text-align:center;}
    .produto img {width:100%; border-radius:10px;}
    .preco {color:green; font-size:20px; margin:10px 0;}
    button {background:#ff3c00; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;}
    button:hover {background:#cc3000;}
  </style>
</head>
<body>

<header>
  <h1>Minha Loja Online</h1>
  <p>Ofertas imperdíveis!</p>
</header>

<div class="container">
  <div class="produto">
    <img src="https://via.placeholder.com/250" alt="Panela">
    <h2>Kit de Panelas Tramontina</h2>
    <p class="preco">R$ 299,99</p>
    <button onclick="comprar()">Comprar</button>
  </div>
</div>

<script>
  function comprar() {
    alert("Produto adicionado ao carrinho!");
  }
</script>

</body>
</html>
